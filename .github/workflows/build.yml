name: Build and Deploy Marp Presentation

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Marp CLI
        run: npm install @marp-team/marp-cli@latest

      - name: Build PDF
        run: npx @marp-team/marp-cli@latest build microsoft-build-2026.marp.html --pdf --allow-local-files -o microsoft-build-2026.pdf

      - name: Upload PDF artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: microsoft-build-2026.pdf

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
